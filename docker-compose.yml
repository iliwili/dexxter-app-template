services:
  backend:
    build: ./backend
    image: ghcr.io/${GITHUB_REPOSITORY:-local/app}-backend:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ghcr.io/${GITHUB_REPOSITORY:-local/app}-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8080
    restart: unless-stopped
