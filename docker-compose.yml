services:
  backend:
    build: ./backend
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/dexxter-backend:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/dexxter-frontend:latest
    ports:
      - "80:3000"
    depends_on:
      - backend
    environment:
      - NUXT_PUBLIC_API_BASE=http://backend:3000
    restart: unless-stopped
